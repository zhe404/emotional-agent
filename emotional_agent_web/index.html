<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感智能体 - 你的AI陪伴伙伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .auth-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-container button:hover {
            opacity: 0.9;
        }
        .auth-container .switch {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .auth-container .switch a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        .error-message {
            color: red;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .assistant-message {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .user-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .assistant-bubble {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #667eea;
        }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        .sidebar {
            padding: 15px 20px;
            background: #fafafa;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .sidebar button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .memory-btn {
            background: #e0e7ff;
            color: #4f46e5;
        }
        .clear-btn {
            background: #fee2e2;
            color: #dc2626;
        }
        .logout-btn {
            background: #f3f4f6;
            color: #6b7280;
        }
        .memory-box {
            margin: 0 20px 20px 20px;
            padding: 15px;
            background: #fef3c7;
            border-radius: 12px;
            display: none;
            font-size: 14px;
            white-space: pre-line;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #666;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="authView">
            <div class="auth-container">
                <h1>🤖 情感智能体</h1>
                
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="邮箱">
                    <input type="password" id="loginPassword" placeholder="密码">
                    <button id="loginBtn">登录</button>
                    <div class="switch">
                        还没有账号？ <a id="showRegisterLink">立即注册</a>
                    </div>
                    <div id="loginError" class="error-message"></div>
                </div>
                
                <div id="registerForm" style="display:none">
                    <input type="text" id="regNickname" placeholder="昵称">
                    <input type="email" id="regEmail" placeholder="邮箱">
                    <input type="password" id="regPassword" placeholder="密码（至少6位）">
                    <button id="registerBtn">注册</button>
                    <div class="switch">
                        已有账号？ <a id="showLoginLink">返回登录</a>
                    </div>
                    <div id="regError" class="error-message"></div>
                </div>
            </div>
        </div>

        <div id="chatView" class="hidden">
            <div class="chat-container">
                <div class="chat-header">
                    <h1>🤖 情感智能体</h1>
                    <div id="currentUser"></div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div style="text-align:center;color:#999;">👋 你好！我是小暖，有什么想聊的吗？</div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="试试：'我叫小明'、'我喜欢吃火锅'" onkeypress="if(event.keyCode==13) sendMessage()">
                    <button id="sendBtn">发送 ✨</button>
                </div>
                <div class="sidebar">
                    <button id="memoryBtn">📖 查看记忆</button>
                    <button id="clearMemoryBtn">🗑️ 清空记忆</button>
                    <button id="logoutBtn">🚪 退出登录</button>
                </div>
                <div id="memoryBox" class="memory-box"></div>
                <div id="loading" class="loading">🤔 小暖正在思考...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        (function() {
            const SUPABASE_URL = "https://cvcqbhoedlmwoarvkcix.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2Y3FiaG9lZGxtd29hcnZrY2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDI5MTIsImV4cCI6MjA5NDcxODkxMn0.KkkNdMUPNNBvvlGyZN_fq7kp-zIQIqv165mAwOLXzxc";
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = null;
            
            // DOM 元素
            const authView = document.getElementById('authView');
            const chatView = document.getElementById('chatView');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginError = document.getElementById('loginError');
            const regError = document.getElementById('regError');
            const currentUserSpan = document.getElementById('currentUser');
            const chatMessages = document.getElementById('chatMessages');
            const messageInput = document.getElementById('messageInput');
            const memoryBox = document.getElementById('memoryBox');
            const loading = document.getElementById('loading');
            
            function showLogin() {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginError.innerText = '';
                regError.innerText = '';
            }
            
            function showRegister() {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginError.innerText = '';
                regError.innerText = '';
            }
            
            function addMessage(text, role) {
                if (chatMessages.children.length === 1 && chatMessages.children[0].innerText.includes('你好！我是小暖')) {
                    chatMessages.innerHTML = '';
                }
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + role + '-message';
                const bubbleClass = role === 'user' ? 'user-bubble' : 'assistant-bubble';
                const safeText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                msgDiv.innerHTML = '<div class="bubble ' + bubbleClass + '">' + safeText + '</div>';
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // 注册（手动创建 profile）
            async function register() {
                const nickname = document.getElementById('regNickname').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                
                if (!nickname || !email || !password) {
                    regError.innerText = '请填写完整信息';
                    return;
                }
                if (password.length < 6) {
                    regError.innerText = '密码至少6位';
                    return;
                }
                
                try {
                    // 1. 先注册用户
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: { nickname: nickname }
                        }
                    });
                    
                    if (error) throw error;
                    
                    if (data.user) {
                        // 2. 手动创建 profile
                        const { error: profileError } = await supabase
                            .from('profiles')
                            .insert({
                                id: data.user.id,
                                nickname: nickname
                            });
                        
                        if (profileError) {
                            console.error('创建 profile 失败:', profileError);
                            // 即使 profile 创建失败，用户已经注册成功
                        }
                    }
                    
                    alert('注册成功！请登录');
                    showLogin();
                    
                } catch (error) {
                    regError.innerText = error.message || '注册失败';
                }
            }
            
            // 登录
            async function login() {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                if (!email || !password) {
                    loginError.innerText = '请填写邮箱和密码';
                    return;
                }
                
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    currentUser = data.user;
                    const nickname = currentUser.user_metadata?.nickname || email.split('@')[0];
                    currentUserSpan.innerText = '当前用户：' + nickname;
                    authView.classList.add('hidden');
                    chatView.classList.remove('hidden');
                    
                } catch (error) {
                    loginError.innerText = error.message || '登录失败';
                }
            }
            
            function logout() {
                supabase.auth.signOut();
                currentUser = null;
                authView.classList.remove('hidden');
                chatView.classList.add('hidden');
                chatMessages.innerHTML = '<div style="text-align:center;color:#999;">👋 你好！我是小暖，有什么想聊的吗？</div>';
            }
            
            async function saveMemory(memoryType, subType, content) {
                if (!currentUser) return;
                await supabase
                    .from('memories')
                    .insert({
                        user_id: currentUser.id,
                        memory_type: memoryType,
                        sub_type: subType,
                        content: content
                    });
            }
            
            async function getMemories() {
                if (!currentUser) return { user_info: {}, likes: [], notes: [] };
                
                const { data, error } = await supabase
                    .from('memories')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (error) return { user_info: {}, likes: [], notes: [] };
                
                const memories = { user_info: {}, likes: [], notes: [] };
                for (let i = 0; i < data.length; i++) {
                    const mem = data[i];
                    if (mem.memory_type === 'user_info' && mem.sub_type) {
                        memories.user_info[mem.sub_type] = mem.content;
                    } else if (mem.memory_type === 'like') {
                        memories.likes.push(mem.content);
                    } else if (mem.memory_type === 'note') {
                        memories.notes.push(mem.content);
                    }
                }
                return memories;
            }
            
            async function clearAllMemories() {
                if (!currentUser) return;
                await supabase.from('memories').delete().eq('user_id', currentUser.id);
            }
            
            function shouldRemember(message) {
                const msg = message.trim();
                
                const nameMatch = msg.match(/我叫([^，。,.！？!?]+)/);
                if (nameMatch) {
                    return { should: true, type: 'user_info', subType: 'name', content: nameMatch[1].trim() };
                }
                
                const ageMatch = msg.match(/(\d+)岁/);
                if (ageMatch) {
                    return { should: true, type: 'user_info', subType: 'age', content: ageMatch[1] };
                }
                
                const likeMatch = msg.match(/我喜欢([^，。,.！？!?]+)/);
                if (likeMatch && likeMatch[1].length < 30) {
                    return { should: true, type: 'like', subType: null, content: likeMatch[1].trim() };
                }
                
                if (msg.includes('请记住') || msg.includes('帮我记住')) {
                    const content = msg.replace(/请记住|帮我记住/, '').trim();
                    if (content) {
                        return { should: true, type: 'note', subType: null, content: content };
                    }
                }
                
                return { should: false };
            }
            
            async function chatWithAI(message, memories) {
                const name = memories.user_info.name;
                
                if (name) {
                    if (message.includes('记得') || message.includes('记忆')) {
                        let reply = '我记得你叫' + name + '呀！';
                        if (memories.likes.length > 0) {
                            reply += ' 你喜欢' + memories.likes.join('、') + '对吧？';
                        }
                        return reply;
                    }
                    return '你好呀，' + name + '！我在听呢。' + (message.length > 20 ? '能再详细说说吗？' : '有什么想和我分享的吗？');
                }
                return "你好呀！我是小暖，你叫什么名字呀？";
            }
            
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;
                
                addMessage(message, 'user');
                messageInput.value = '';
                loading.style.display = 'block';
                
                try {
                    const memoryCheck = shouldRemember(message);
                    if (memoryCheck.should) {
                        await saveMemory(memoryCheck.type, memoryCheck.subType, memoryCheck.content);
                        
                        if (memoryCheck.type === 'user_info' && memoryCheck.subType === 'name') {
                            addMessage('📝 记住了！你好呀，' + memoryCheck.content + '！很高兴认识你~', 'assistant');
                            loading.style.display = 'none';
                            return;
                        }
                        if (memoryCheck.type === 'like') {
                            addMessage('📝 记住了！原来你喜欢' + memoryCheck.content + '呀，真不错~', 'assistant');
                            loading.style.display = 'none';
                            return;
                        }
                        if (memoryCheck.type === 'note') {
                            addMessage('📝 记住了：' + memoryCheck.content, 'assistant');
                            loading.style.display = 'none';
                            return;
                        }
                    }
                    
                    const memories = await getMemories();
                    const reply = await chatWithAI(message, memories);
                    addMessage(reply, 'assistant');
                    
                } catch (error) {
                    addMessage('网络错误，请重试', 'assistant');
                }
                
                loading.style.display = 'none';
            }
            
            async function showMemory() {
                const memories = await getMemories();
                let text = '';
                if (memories.user_info.name) text += '👤 名字：' + memories.user_info.name + '\n';
                if (memories.user_info.age) text += '🎂 年龄：' + memories.user_info.age + '岁\n';
                if (memories.likes.length > 0) text += '\n❤️ 喜欢：' + memories.likes.join('、') + '\n';
                if (memories.notes.length > 0) text += '\n📌 其他：' + memories.notes.join('\n') + '\n';
                
                if (!text) text = '暂无记忆。\n\n💡 试试说："我叫小明"、"我喜欢吃火锅"';
                
                memoryBox.innerHTML = '<strong>📝 我记住的事情：</strong><br>' + text.replace(/\n/g, '<br>');
                memoryBox.style.display = 'block';
                setTimeout(function() { memoryBox.style.display = 'none'; }, 8000);
            }
            
            async function clearMemory() {
                if (confirm('确定要清空所有记忆吗？')) {
                    await clearAllMemories();
                    alert('✅ 所有记忆已清空');
                }
            }
            
            async function checkSession() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    const nickname = currentUser.user_metadata?.nickname || currentUser.email?.split('@')[0];
                    currentUserSpan.innerText = '当前用户：' + nickname;
                    authView.classList.add('hidden');
                    chatView.classList.remove('hidden');
                }
            }
            
            // 绑定事件
            document.getElementById('loginBtn').onclick = login;
            document.getElementById('registerBtn').onclick = register;
            document.getElementById('showRegisterLink').onclick = showRegister;
            document.getElementById('showLoginLink').onclick = showLogin;
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('memoryBtn').onclick = showMemory;
            document.getElementById('clearMemoryBtn').onclick = clearMemory;
            document.getElementById('logoutBtn').onclick = logout;
            
            checkSession();
        })();
    </script>
</body>
</html>
